<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="#0f172a"/>

  <!-- Abstract route lines -->
  <path d="M80 400 C180 300, 330 350, 400 180" fill="none" stroke="url(#grad4)" stroke-width="14" stroke-linecap="round"/>
  <circle cx="400" cy="180" r="8" fill="#fff"/>

  <!-- Delivery box / truck -->
  <g transform="translate(150,220)">
    <rect x="0" y="0" width="130" height="70" rx="16" fill="url(#grad4)"/>
    <rect x="10" y="10" width="50" height="50" rx="6" fill="#fff"/>
    <circle cx="25" cy="70" r="10" fill="#000"/>
    <circle cx="105" cy="70" r="10" fill="#000"/>
  </g>

  <!-- Scan highlight -->
  <rect x="100" y="260" width="312" height="6" rx="3" fill="url(#grad4)"/>
</svg>