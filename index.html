<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Retour App">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <title>Retour App</title>
    <!-- مكتبة SheetJS لإنشاء ملفات Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- مكتبة الماسح الضوئي -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- إعدادات عامة وثيم داكن --- */
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #404040;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --primary-color: #4a9eff;
            --success-color: #4caf50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --archive-color: #9c27b0;
            --border-radius: 12px;
            --box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            --top-bar-height: 60px;
            --side-menu-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding-top: var(--top-bar-height);
            transition: transform 0.3s ease;
        }

        /* --- القائمة الجانبية --- */
        .side-menu {
            position: fixed;
            top: 0;
            right: 0;
            width: var(--side-menu-width);
            height: 100vh;
            background-color: var(--bg-secondary);
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .side-menu.open {
            transform: translateX(0);
        }

        .side-menu-header {
            padding: 20px;
            background-color: var(--bg-tertiary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .side-menu-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .side-menu-close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .side-menu-close-btn:hover { color: var(--danger-color); }

        .side-menu-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .side-menu .btn {
            text-align: right;
        }

        /* --- الشريط العلوي --- */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-secondary);
            padding: 10px 20px;
            box-shadow: var(--box-shadow);
            z-index: 999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--top-bar-height);
        }

        .menu-toggle-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        .menu-toggle-btn:hover { background-color: var(--bg-tertiary); }

        .container {
            max-width: 700px;
            margin: 20px auto;
            background-color: var(--bg-secondary);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }

        /* --- حاوية الرسائل العلوية --- */
        #notification-container {
            position: fixed;
            top: calc(var(--top-bar-height) + 10px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 500px;
        }

        .notification {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: var(--border-radius);
            color: white;
            font-weight: 500;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease;
            transform: translateY(-20px);
        }
        .notification.show { opacity: 1; transform: translateY(0); }
        .notification.success { background-color: var(--success-color); }
        .notification.error { background-color: var(--danger-color); }

        /* --- الماسح الضوئي --- */
        #scanner-container {
            max-width: 400px;
            height: 300px;
            margin: 0 auto 25px auto;
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-tertiary);
            box-shadow: var(--box-shadow);
            position: relative;
            border: 1px solid var(--bg-secondary);
        }

        #qr-reader {
            width: 100% !important;
            height: 100% !important;
        }

        #qr-reader__scan_region {
            border: 2px solid var(--primary-color) !important;
            border-radius: 12px !important;
        }

        #qr-reader__camera_permission_button {
            background: var(--primary-color) !important;
            color: white !important;
            border: none !important;
            padding: 12px 24px !important;
            border-radius: 12px !important;
            font-weight: 500 !important;
            cursor: pointer !important;
            margin: 16px !important;
            transition: all 0.3s ease !important;
            box-shadow: var(--box-shadow) !important;
        }

        .flashlight-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(8px);
            color: var(--text-primary);
            border: 1px solid var(--bg-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            z-index: 10;
            transition: all 0.3s ease;
        }
        .flashlight-btn:hover {
            background: var(--bg-tertiary);
            transform: scale(1.1);
        }
        .flashlight-btn.active {
            background: var(--warning-color);
            color: white;
            border-color: var(--warning-color);
        }

        /* --- الأقسام والحقول --- */
        .section {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid var(--bg-tertiary);
            border-radius: var(--border-radius);
            background-color: var(--bg-tertiary);
        }

        .section-title {
            font-weight: 500;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--bg-primary);
            border-radius: var(--border-radius);
            font-size: 16px;
            resize: vertical;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        /* --- الأزرار --- */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--border-radius);
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            transform: scale(1);
        }
        .btn:hover { transform: scale(1.03); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: scale(1); }

        .btn-primary { background-color: var(--primary-color); }
        .btn-secondary { background-color: var(--text-secondary); }
        .btn-success { background-color: var(--success-color); }
        .btn-danger { background-color: var(--danger-color); }
        .btn-warning { background-color: var(--warning-color); color: var(--bg-primary); }
        .btn-archive { background-color: var(--archive-color); }
        
        .btn-group { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .btn-group .btn { width: calc(50% - 5px); }

        /* --- القوائم القابلة للطي --- */
        .collapsible-list {
            background-color: var(--bg-primary);
            border-radius: var(--border-radius);
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid var(--bg-secondary);
        }

        .list-header {
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-secondary);
            transition: background-color 0.3s;
        }
        .list-header:hover { background-color: #3a3a3a; }
        .list-header h3 { margin: 0; font-size: 1.1rem; }
        .list-header .count {
            background-color: var(--primary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
        }
        .list-header .indicator {
            transition: transform 0.3s;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }
        .collapsible-list.expanded .indicator { transform: rotate(180deg); }

        .list-content {
            max-height: 0;
            overflow-y: auto;
            transition: max-height 0.4s ease-out, padding 0.4s ease-out;
            padding: 0 15px;
        }
        .collapsible-list.expanded .list-content {
            max-height: 400px;
            padding: 15px;
        }

        .list-content ul { list-style: none; }
        .list-content li {
            padding: 12px;
            background-color: var(--bg-tertiary);
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
            border: 1px solid transparent;
        }
        .list-content li:hover { background-color: #4a4a4a; border-color: var(--primary-color); }
        .list-content li:active { background-color: #555; }
        .list-content .empty-message { text-align: center; color: var(--text-secondary); padding: 20px; }

        /* --- النوافذ المنبثقة --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            animation: fadeIn 0.3s;
        }
        .modal-content {
            background-color: var(--bg-secondary);
            margin: 10% auto;
            padding: 25px;
            border: 1px solid var(--bg-tertiary);
            width: 90%;
            max-width: 450px;
            border-radius: var(--border-radius);
            animation: slideIn 0.3s;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; text-align: center; color: var(--primary-color); }
        .modal-content p { text-align: center; font-weight: bold; margin-bottom: 20px; }
        .close {
            color: var(--text-secondary);
            float: left;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover, .close:focus { color: var(--text-primary); }

        /* --- قسم الأرشيف --- */
        .archive-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .archive-item {
            display: flex;
            flex-direction: column;
            padding: 15px;
            background-color: var(--bg-primary);
            border-radius: var(--border-radius);
            margin-bottom: 10px;
            border: 1px solid var(--bg-tertiary);
            transition: all 0.3s ease;
        }
        .archive-item:hover {
            border-color: var(--archive-color);
            box-shadow: 0 4px 12px rgba(156, 39, 176, 0.2);
        }
        
        .archive-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .archive-item-name {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        
        .archive-item-date {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .archive-item-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }
        
        .archive-stat {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
        }
        
        .archive-stat-value {
            color: var(--primary-color);
            font-weight: 700;
        }
        
        .archive-item-actions {
            display: flex;
            gap: 10px;
        }
        
        .archive-item-actions .btn {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }
        
        .empty-archive {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        
        .empty-archive-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- أيقونات SVG --- */
        .icon {
            width: 18px;
            height: 18px;
            display: inline-block;
            vertical-align: middle;
            margin-left: 5px;
        }

    </style>
</head>
<body>

    <!-- القائمة الجانبية -->
    <div id="side-menu" class="side-menu">
        <div class="side-menu-header">
            <h2>القائمة</h2>
            <button class="side-menu-close-btn" onclick="toggleSideMenu()">&times;</button>
        </div>
        <div class="side-menu-content">
            <button class="btn btn-secondary" onclick="toggleAddSection(); toggleSideMenu();">قائمة الطلبيات</button>
            <button class="btn btn-primary" onclick="showAddOrderModal(); toggleSideMenu();">إضافة طلبية</button>
            <button class="btn btn-archive" onclick="showArchiveModal(); toggleSideMenu();">الأرشيف</button>
            <button class="btn btn-danger" onclick="cleanSystem()">تنظيف النظام</button>
            <button class="btn btn-warning" onclick="exportToExcel(); toggleSideMenu();">تحميل القوائم كملف Excel</button>
        </div>
    </div>

    <!-- الشريط العلوي -->
    <div class="top-bar">
        <button class="menu-toggle-btn" onclick="toggleSideMenu()">☰</button>
        <button class="btn btn-success" onclick="searchAndAddCode()" style="width: auto; padding: 10px 20px;">ابحث</button>
    </div>

    <div id="notification-container"></div>

    <div class="container">
        <!-- الماسح الضوئي المدمج -->
        <div id="scanner-container">
            <button id="flashlightBtn" class="flashlight-btn" title="تفعيل/إلغاء تفعيل الفلاش">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </button>
            <div id="qr-reader"></div>
        </div>

        <div id="addCodesSection" class="section" style="display: none;">
            <div class="section-title">إضافة مجموعة طلبيات جديدة</div>
            <textarea id="codeInput" rows="5" placeholder="ألصق مجموعة الأكواد هنا، كل كود في سطر جديد"></textarea>
            <button id="addCodesBtn" class="btn btn-primary" onclick="addCodes()">إضافة الأكواد</button>
        </div>

        <!-- قائمة جميع الطلبيات -->
        <div class="collapsible-list" id="master-list-container">
            <div class="list-header" onclick="toggleList('master-list-container')">
                <h3>قائمة جميع الطلبيات</h3>
                <div>
                    <span class="count" id="master-count">0</span>
                    <span class="indicator">▼</span>
                </div>
            </div>
            <div class="list-content">
                <ul id="masterCodeList"></ul>
            </div>
        </div>

        <!-- قائمة الطلبيات المطلوبة -->
        <div class="collapsible-list" id="requested-list-container">
            <div class="list-header" onclick="toggleList('requested-list-container')">
                <h3>قائمة الطلبيات المطلوبة</h3>
                <div>
                    <span class="count" id="requested-count">0</span>
                    <span class="indicator">▼</span>
                </div>
            </div>
            <div class="list-content">
                <ul id="requestedCodeList"></ul>
            </div>
        </div>

        <!-- قائمة الطلبيات المضافة -->
        <div class="collapsible-list" id="added-list-container">
            <div class="list-header" onclick="toggleList('added-list-container')">
                <h3>الطلبيات المضافة</h3>
                <div>
                    <span class="count" id="added-count">0</span>
                    <span class="indicator">▼</span>
                </div>
            </div>
            <div class="list-content">
                <ul id="addedCodeList"></ul>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة طلبية -->
    <div id="addOrderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddOrderModal()">&times;</span>
            <h3>إضافة طلبية جديدة</h3>
            <input type="text" id="addOrderInput" placeholder="اكتب الكود هنا">
            <button class="btn btn-primary" onclick="addSingleCodeToAddedList()">إضافة</button>
        </div>
    </div>

    <!-- نافذة الأرشيف -->
    <div id="archiveModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeArchiveModal()">&times;</span>
            <h3>الأرشيف</h3>
            <div id="archiveList" class="archive-list"></div>
        </div>
    </div>

    <!-- نافذة خيارات الكود -->
    <div id="actionModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>خيارات الكود</h3>
            <p id="modalCodeText"></p>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="copyCodeFromModal()">نسخ الكود</button>
                <button class="btn btn-danger" onclick="deleteCodeFromModal()">حذف الكود</button>
            </div>
        </div>
    </div>

    <!-- عناصر الصوت -->
    <audio id="successSound" preload="auto">
        <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
    </audio>
    <audio id="errorSound" preload="auto">
        <source src="https://www.soundjay.com/buttons/sounds/button-10.mp3" type="audio/mpeg">
    </audio>
    <audio id="duplicateSound" preload="auto">
        <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('SW Registration Failed', err));
            });
        }

        // --- متغيرات عامة ---
        let masterCodes = JSON.parse(localStorage.getItem('masterCodes')) || [];
        let addedCodes = JSON.parse(localStorage.getItem('addedCodes')) || [];
        let requestedCodes = JSON.parse(localStorage.getItem('requestedCodes')) || [];
        let archives = JSON.parse(localStorage.getItem('archives')) || [];
        let currentActionCode = null;
        let currentActionListType = null;
        let pressTimer = null;
        let html5QrCode;
        let isFlashlightOn = false;

        // --- دوال أساسية ---
        function saveCodes() {
            localStorage.setItem('masterCodes', JSON.stringify(masterCodes));
            localStorage.setItem('addedCodes', JSON.stringify(addedCodes));
            localStorage.setItem('requestedCodes', JSON.stringify(requestedCodes));
        }

        function saveArchives() {
            localStorage.setItem('archives', JSON.stringify(archives));
        }

        function showNotification(message, type) {
            const container = document.getElementById('notification-container');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            container.appendChild(notification);
            setTimeout(() => notification.classList.add('show'), 10);
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => container.removeChild(notification), 500);
            }, 3000);
        }

        // --- دوال الصوت ---
        function playSound(soundType) {
            let sound;
            switch(soundType) {
                case 'success':
                    sound = document.getElementById('successSound');
                    break;
                case 'error':
                    sound = document.getElementById('errorSound');
                    break;
                case 'duplicate':
                    sound = document.getElementById('duplicateSound');
                    break;
                default:
                    return;
            }
            
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.error("Error playing sound:", e));
            }
        }

        // --- دوال التحكم بالواجهة ---
        function toggleSideMenu() {
            const sideMenu = document.getElementById('side-menu');
            sideMenu.classList.toggle('open');
        }

        function toggleAddSection() {
            const section = document.getElementById('addCodesSection');
            if (section.style.display === 'none') {
                section.style.display = 'block';
            } else {
                section.style.display = 'none';
            }
        }
        
        function showAddOrderModal() {
            document.getElementById('addOrderModal').style.display = 'block';
        }

        function closeAddOrderModal() {
            document.getElementById('addOrderModal').style.display = 'none';
            document.getElementById('addOrderInput').value = '';
        }

        function showArchiveModal() {
            document.getElementById('archiveModal').style.display = 'block';
            renderArchiveList();
        }

        function closeArchiveModal() {
            document.getElementById('archiveModal').style.display = 'none';
        }

        function toggleList(listId) {
            document.getElementById(listId).classList.toggle('expanded');
        }

        function updateListCounts() {
            document.getElementById('master-count').textContent = masterCodes.length;
            document.getElementById('added-count').textContent = addedCodes.length;
            document.getElementById('requested-count').textContent = requestedCodes.length;
        }

        // --- دوال تحديث القوائم مع إضافة مستمعي الأحداث ---
        function attachLongPressListener(element, code, listType) {
            const startPress = (e) => {
                pressTimer = setTimeout(() => {
                    e.preventDefault();
                    showActionModal(code, listType);
                }, 500);
            };
            const endPress = () => clearTimeout(pressTimer);

            element.addEventListener('touchstart', startPress, { passive: false });
            element.addEventListener('touchend', endPress);
            element.addEventListener('touchmove', endPress);
            element.addEventListener('mousedown', startPress);
            element.addEventListener('mouseup', endPress);
            element.addEventListener('mouseleave', endPress);
        }

        function updateMasterList() {
            const listElement = document.getElementById('masterCodeList');
            listElement.innerHTML = masterCodes.length ? '' : '<li class="empty-message">لا توجد أكواد بعد</li>';
            masterCodes.forEach(code => {
                const li = document.createElement('li'); li.textContent = code;
                attachLongPressListener(li, code, 'master');
                listElement.appendChild(li);
            });
            updateListCounts();
        }

        function updateAddedList() {
            const listElement = document.getElementById('addedCodeList');
            listElement.innerHTML = addedCodes.length ? '' : '<li class="empty-message">لا توجد أكواد مضافة</li>';
            addedCodes.forEach(code => {
                const li = document.createElement('li'); li.textContent = code;
                attachLongPressListener(li, code, 'added');
                listElement.appendChild(li);
            });
            updateListCounts();
        }

        function updateRequestedList() {
            const listElement = document.getElementById('requestedCodeList');
            listElement.innerHTML = requestedCodes.length ? '' : '<li class="empty-message">لا توجد طلبيات مطلوبة</li>';
            requestedCodes.forEach(item => {
                const li = document.createElement('li'); 
                li.textContent = item.code;
                attachLongPressListener(li, item.code, 'requested');
                listElement.appendChild(li);
            });
            updateListCounts();
        }

        // --- دوال الأرشيف ---
        function generateExcelData() {
            const ws_data = [];
            ws_data.push(["الكود", "الحالة", "المصدر", "تاريخ الإضافة"]);
            
            const allCodesSet = new Set([...masterCodes, ...addedCodes, ...requestedCodes.map(item => item.code)]);
            allCodesSet.forEach(code => {
                const requestedItem = requestedCodes.find(item => item.code === code);
                const statut = requestedItem ? "مطلوب" : "في الانتظار";
                let source = "قائمة رئيسية";
                
                if (requestedItem) {
                    if (requestedItem.fromAddedList) {
                        source = "قائمة مضافة";
                    }
                }
                
                const date = requestedItem ? new Date().toLocaleDateString('ar-MA') : "-";
                ws_data.push([code, statut, source, date]);
            });
            
            return ws_data;
        }

        function createArchiveFile() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('ar-MA').replace(/\//g, '-');
            const timeStr = now.toLocaleTimeString('ar-MA', { hour: '2-digit', minute: '2-digit' }).replace(/:/g, '-');
            
            const archiveData = {
                id: Date.now(),
                name: `أرشيف_${dateStr}_${timeStr}`,
                date: now.toISOString(),
                masterCodes: [...masterCodes],
                addedCodes: [...addedCodes],
                requestedCodes: [...requestedCodes],
                stats: {
                    master: masterCodes.length,
                    added: addedCodes.length,
                    requested: requestedCodes.length,
                    total: masterCodes.length + addedCodes.length + requestedCodes.length
                }
            };
            
            return archiveData;
        }

        function renderArchiveList() {
            const container = document.getElementById('archiveList');
            
            if (archives.length === 0) {
                container.innerHTML = `
                    <div class="empty-archive">
                        <div class="empty-archive-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/>
                            </svg>
                        </div>
                        <p>لا توجد ملفات في الأرشيف</p>
                        <p style="font-size: 0.85rem; margin-top: 5px;">سيتم إنشاء أرشيف تلقائي عند تنظيف النظام</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = archives.map(archive => `
                <div class="archive-item">
                    <div class="archive-item-header">
                        <span class="archive-item-name">${archive.name}</span>
                        <span class="archive-item-date">${new Date(archive.date).toLocaleDateString('ar-MA')}</span>
                    </div>
                    <div class="archive-item-stats">
                        <span class="archive-stat">
                            الكل: <span class="archive-stat-value">${archive.stats.total}</span>
                        </span>
                        <span class="archive-stat">
                            مطلوب: <span class="archive-stat-value">${archive.stats.requested}</span>
                        </span>
                    </div>
                    <div class="archive-item-actions">
                        <button class="btn btn-primary" onclick="downloadArchive(${archive.id})">تحميل</button>
                        <button class="btn btn-success" onclick="restoreArchive(${archive.id})">استعادة</button>
                        <button class="btn btn-danger" onclick="deleteArchive(${archive.id})">حذف</button>
                    </div>
                </div>
            `).join('');
        }

        function downloadArchive(archiveId) {
            const archive = archives.find(a => a.id === archiveId);
            if (!archive) {
                showNotification('الملف غير موجود', 'error');
                return;
            }
            
            const ws_data = [];
            ws_data.push(["الكود", "الحالة", "المصدر"]);
            
            const allCodes = [...archive.data.masterCodes, ...archive.data.addedCodes, ...archive.data.requestedCodes.map(i => i.code)];
            const uniqueCodes = [...new Set(allCodes)];
            
            uniqueCodes.forEach(code => {
                const requestedItem = archive.data.requestedCodes.find(item => item.code === code);
                const statut = requestedItem ? "مطلوب" : "في الانتظار";
                let source = "قائمة رئيسية";
                
                if (requestedItem && requestedItem.fromAddedList) {
                    source = "قائمة مضافة";
                }
                
                ws_data.push([code, statut, source]);
            });
            
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "الطلبيات");
            
            const fileName = `${archive.name}.xlsx`;
            XLSX.writeFile(wb, fileName);
            
            showNotification('تم تحميل الملف بنجاح', 'success');
        }

        function restoreArchive(archiveId) {
            const archive = archives.find(a => a.id === archiveId);
            if (!archive) {
                showNotification('الملف غير موجود', 'error');
                return;
            }
            
            const isConfirmed = confirm('سيتم استبدال جميع البيانات الحالية بالبيانات المحفوظة. هل تريد المتابعة؟');
            if (!isConfirmed) return;
            
            masterCodes = [...archive.data.masterCodes];
            addedCodes = [...archive.data.addedCodes];
            requestedCodes = [...archive.data.requestedCodes];
            
            saveCodes();
            updateMasterList();
            updateAddedList();
            updateRequestedList();
            
            showNotification('تم استعادة البيانات بنجاح', 'success');
            closeArchiveModal();
        }

        function deleteArchive(archiveId) {
            const isConfirmed = confirm('هل أنت متأكد من حذف هذا الملف من الأرشيف؟');
            if (!isConfirmed) return;
            
            archives = archives.filter(a => a.id !== archiveId);
            saveArchives();
            renderArchiveList();
            showNotification('تم حذف الملف من الأرشيف', 'success');
        }

        // --- دوال المنطق الرئيسي ---
        function addCodes() {
            const textarea = document.getElementById('codeInput'); const addBtn = document.getElementById('addCodesBtn');
            const pastedText = textarea.value; if (!pastedText.trim()) { showNotification('الرجاء لصق أكواد أولاً.', 'error'); return; }
            addBtn.disabled = true; addBtn.textContent = 'جاري الإضافة...';
            const newCodes = pastedText.split('\n'); let addedCount = 0, duplicateCount = 0;
            newCodes.forEach(code => { const trimmedCode = code.trim(); if (trimmedCode && !masterCodes.includes(trimmedCode)) { masterCodes.push(trimmedCode); addedCount++; } else if (trimmedCode) { duplicateCount++; } });
            saveCodes(); updateMasterList(); textarea.value = ''; addBtn.disabled = false; addBtn.textContent = 'إضافة الأكواد';
            if (addedCount > 0) showNotification(`تمت إضافة ${addedCount} كود جديد بنجاح.`, 'success');
            if (duplicateCount > 0) showNotification(`تم تجاهل ${duplicateCount} كود مكرر.`, 'error');
            if (addedCount > 0) toggleAddSection();
        }

        function addSingleCodeToAddedList() {
            const code = document.getElementById('addOrderInput').value.trim();
            if (!code) { showNotification('الرجاء كتابة كود أولاً.', 'error'); return; }
            if (addedCodes.includes(code)) { showNotification(`الكود "${code}" موجود مسبقاً في قائمة الطلبات المضافة.`, 'error'); return; }
            addedCodes.push(code); saveCodes(); updateAddedList();
            showNotification(`تمت إضافة الكود "${code}" بنجاح.`, 'success');
            closeAddOrderModal();
        }

        // دالة موحدة لمعالجة الكود (من البحث أو الماسح)
        async function processCode(code) {
            const trimmedCode = code.trim();
            if (!trimmedCode) { showNotification('الكود فارغ.', 'error'); playSound('error'); return; }
            if (requestedCodes.some(item => item.code === trimmedCode)) { 
                showNotification(`الكود "${trimmedCode}" تمت إضافته سابقاً.`, 'error'); 
                playSound('duplicate'); 
                return; 
            }

            let source = 'manual';
            let fromAddedList = false;
            
            const masterIndex = masterCodes.indexOf(trimmedCode);
            if (masterIndex !== -1) { 
                masterCodes.splice(masterIndex, 1); 
            }
            else {
                const addedIndex = addedCodes.indexOf(trimmedCode);
                if (addedIndex !== -1) { 
                    addedCodes.splice(addedIndex, 1); 
                    source = 'added_list';
                    fromAddedList = true;
                }
                else { 
                    showNotification(`الكود "${trimmedCode}" غير مطلوب.`, 'error'); 
                    playSound('error'); 
                    return; 
                }
            }

            requestedCodes.push({ code: trimmedCode, source, fromAddedList });
            saveCodes();
            updateMasterList(); updateAddedList(); updateRequestedList();
            showNotification(`تمت إضافة الكود "${trimmedCode}" بنجاح.`, 'success'); 
            playSound('success');
        }

        async function searchAndAddCode() {
            try {
                const text = await navigator.clipboard.readText();
                await processCode(text);
            } catch (err) { showNotification('لا يمكن الوصول إلى الحافظة.', 'error'); }
        }

        // --- دوال الماسح الضوئي ---
        function initScanner() {
            const qrCodeRegionId = "qr-reader";
            html5QrCode = new Html5Qrcode(qrCodeRegionId);
            const config = { fps: 10, qrbox: { width: 250, height: 250 }, supportedScanTypes: [0, 1] };

            function onScanSuccessCallback(decodedText, decodedResult) {
                processCode(decodedText);
                html5QrCode.pause();
                setTimeout(() => { html5QrCode.resume(); }, 2000);
            }
            function onScanFailureCallback(errorMessage) {}

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccessCallback, onScanFailureCallback)
            .then(() => { /* success */ })
            .catch((err) => {
                html5QrCode.start({ facingMode: "user" }, config, onScanSuccessCallback, onScanFailureCallback)
                .catch(() => { showNotification('فشل تشغيل الكاميرا. يرجى التحقق من الأذونات.', 'error'); });
            });
        }

        function toggleFlashlight() {
            if (!html5QrCode) return;
            const flashlightBtn = document.getElementById('flashlightBtn');
            if (!isFlashlightOn) {
                html5QrCode.applyVideoConstraints({
                    advanced: [{torch: true}]
                }).then(() => {
                    isFlashlightOn = true;
                    flashlightBtn.classList.add('active');
                }).catch(err => {
                    showNotification('الفلاش غير مدعوم.', 'error');
                    console.warn("Flashlight not available:", err);
                });
            } else {
                html5QrCode.applyVideoConstraints({
                    advanced: [{torch: false}]
                }).then(() => {
                    isFlashlightOn = false;
                    flashlightBtn.classList.remove('active');
                }).catch(err => {
                    showNotification('حدث خطأ أثناء إيقاف تشغيل الفلاش.', 'error');
                    console.warn("Error turning off flashlight:", err);
                });
            }
        }

        // --- دوال النافذة المنبثقة ---
        function showActionModal(code, listType) {
            currentActionCode = code;
            currentActionListType = listType;
            document.getElementById('modalCodeText').textContent = code;
            document.getElementById('actionModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('actionModal').style.display = 'none';
            currentActionCode = null;
            currentActionListType = null;
        }

        async function copyCodeFromModal() {
            if (currentActionCode) {
                try { await navigator.clipboard.writeText(currentActionCode); showNotification(`تم نسخ الكود: ${currentActionCode}`, 'success'); }
                catch (err) { showNotification('فشل نسخ الكود.', 'error'); }
            }
            closeModal();
        }

        function deleteCodeFromModal() {
            if (!currentActionCode || !currentActionListType) return;
            let deleted = false;
            if (currentActionListType === 'requested') {
                const itemIndex = requestedCodes.findIndex(item => item.code === currentActionCode);
                if (itemIndex > -1) {
                    const item = requestedCodes[itemIndex];
                    if (item.source === 'added_list') { addedCodes.push(item.code); } else { masterCodes.push(item.code); }
                    requestedCodes.splice(itemIndex, 1);
                    deleted = true; showNotification(`تم حذف الكود وإرجاعه: ${item.code}`, 'success');
                }
            } else if (currentActionListType === 'master') {
                const index = masterCodes.indexOf(currentActionCode);
                if (index > -1) { masterCodes.splice(index, 1); deleted = true; showNotification(`تم حذف الكود نهائياً: ${currentActionCode}`, 'success'); }
            } else if (currentActionListType === 'added') {
                const index = addedCodes.indexOf(currentActionCode);
                if (index > -1) { addedCodes.splice(index, 1); deleted = true; showNotification(`تم حذف الكود نهائياً: ${currentActionCode}`, 'success'); }
            }
            if (deleted) { saveCodes(); updateMasterList(); updateAddedList(); updateRequestedList(); }
            closeModal();
        }
        
        // --- دالة تنظيف النظام مع الأرشفة ---
        function cleanSystem() {
            const totalCodes = masterCodes.length + addedCodes.length + requestedCodes.length;
            
            if (totalCodes === 0) {
                showNotification('لا توجد بيانات لحذفها.', 'error');
                return;
            }
            
            const isConfirmed = confirm(`هل أنت متأكد أنك تريد حذف جميع البيانات؟\n\nسيتم حفظ نسخة في الأرشيف قبل الحذف.\n\nإجمالي العناصر: ${totalCodes}`);
            if (!isConfirmed) return;
            
            // إنشاء أرشيف قبل الحذف
            const archive = createArchiveFile();
            archive.data = {
                masterCodes: [...masterCodes],
                addedCodes: [...addedCodes],
                requestedCodes: [...requestedCodes]
            };
            
            // إضافة الأرشيف
            archives.unshift(archive);
            
            // الاحتفاظ بآخر 20 ملف فقط
            if (archives.length > 20) {
                archives = archives.slice(0, 20);
            }
            
            saveArchives();
            
            // تحميل الملف تلقائياً
            const ws_data = generateExcelData();
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "الطلبيات");
            
            const fileName = `${archive.name}.xlsx`;
            XLSX.writeFile(wb, fileName);
            
            // حذف البيانات
            localStorage.removeItem('masterCodes');
            localStorage.removeItem('addedCodes');
            localStorage.removeItem('requestedCodes');
            masterCodes = []; 
            addedCodes = []; 
            requestedCodes = [];
            
            updateMasterList(); 
            updateAddedList(); 
            updateRequestedList();
            
            showNotification('تم تنظيف النظام وحفظ نسخة في الأرشيف', 'success');
        }

        // --- دالة التصدير إلى Excel ---
        function exportToExcel() {
            const ws_data = []; ws_data.push(["Code", "Statut", "Source"]);
            const allCodesSet = new Set([...masterCodes, ...addedCodes, ...requestedCodes.map(item => item.code)]);
            allCodesSet.forEach(code => {
                const requestedItem = requestedCodes.find(item => item.code === code);
                const statut = requestedItem ? "Demandée" : "En attente";
                let source = "";
                if (requestedItem) {
                    if (requestedItem.fromAddedList) {
                        source = "ajouté";
                    }
                }
                ws_data.push([code, statut, source]);
            });
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Commandes");
            const today = new Date().toISOString().slice(0, 10);
            const fileName = `Liste Retour ${today}.xlsx`;
            XLSX.writeFile(wb, fileName);
            showNotification('تم تحميل ملف Excel بنجاح.', 'success');
        }

        // --- تشغيل عند تحميل الصفحة ---
        document.addEventListener('DOMContentLoaded', () => {
            if (requestedCodes.length > 0 && typeof requestedCodes[0] === 'string') {
                requestedCodes = requestedCodes.map(code => ({ code, source: 'manual', fromAddedList: false }));
                saveCodes();
            }
            updateMasterList(); updateAddedList(); updateRequestedList();
            initScanner();
            
            document.getElementById('flashlightBtn').addEventListener('click', toggleFlashlight);
        });

        // إغلاق القائمة عند الضغط خارجها
        window.onclick = function(event) {
            const sideMenu = document.getElementById('side-menu');
            if (event.target == document.getElementById('actionModal')) closeModal();
            if (event.target == document.getElementById('addOrderModal')) closeAddOrderModal();
            if (event.target == document.getElementById('archiveModal')) closeArchiveModal();
            if (!sideMenu.contains(event.target) && !event.target.classList.contains('menu-toggle-btn')) {
                sideMenu.classList.remove('open');
            }
        }
    </script>
</body>
</html>
